name: checks

on:
  push:
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Regenerate SVG charts
        run: python scripts/render_svg_charts.py

      - name: Ensure generated charts are committed
        run: git diff --exit-code docs/assets

      - name: Run tests
        run: python -m pytest tests -q
